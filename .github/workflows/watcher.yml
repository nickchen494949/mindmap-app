name: AI Watcher Pipeline
on:
  push:
    paths: ['.ai/inbox/**']
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watcher:
    runs-on: ubuntu-latest
    env:
      REPO_DIR: ${{ github.workspace }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aider
        run: pip install aider-chat

      - name: Install npm deps + Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Watcher
        run: bash scripts/ci-watcher.sh

      - name: Commit & Push Results
        run: |
          git config user.name "AI Watcher Bot"
          git config user.email "watcher@ai-pipeline.local"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🤖 CI Watcher run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "No changes to commit."
          fi
