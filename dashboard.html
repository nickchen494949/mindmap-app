<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pipeline Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
  
  :root {
    --bg-dark: #090d16;
    --bg-card: rgba(17, 25, 40, 0.75);
    --border-color: rgba(255, 255, 255, 0.08);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --clr-primary: #6366f1;
    --clr-success: #10b981;
    --clr-warning: #f59e0b;
    --clr-danger: #ef4444;
    --clr-audit: #8b5cf6;
    --glow-primary: rgba(99, 102, 241, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg-dark) 70%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    padding: 32px 0;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 32px;
    backdrop-filter: blur(12px);
    background: rgba(9, 13, 22, 0.4);
    border-radius: 16px;
    border: 1px solid var(--border-color);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
  }
  
  .header h1 {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #818cf8, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  
  .header .subtitle { 
    color: var(--text-secondary); 
    font-size: 15px; 
    font-weight: 400;
    opacity: 0.9;
  }
  
  .header .last-update { 
    color: var(--text-muted); 
    font-size: 12px; 
    margin-top: 12px; 
    font-family: 'JetBrains Mono', monospace;
  }
  
  .header .watcher-status {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
  }
  .watcher-status.idle { 
    background: rgba(16, 185, 129, 0.1); 
    color: var(--clr-success); 
    border: 1px solid rgba(16, 185, 129, 0.2);
  }
  .watcher-status.busy { 
    background: rgba(139, 92, 246, 0.1); 
    color: var(--clr-audit); 
    border: 1px solid rgba(139, 92, 246, 0.2);
    animation: pulse 1.5s infinite; 
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s, border-color 0.3s;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.15);
  }
  .stat-card .number { 
    font-size: 32px; 
    font-weight: 800; 
    font-family: 'Outfit', sans-serif;
  }
  .stat-card .label { 
    color: var(--text-secondary); 
    font-size: 12px; 
    margin-top: 4px; 
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }
  .stat-card.total .number { color: var(--text-primary); }
  .stat-card.done .number { color: var(--clr-success); }
  .stat-card.review .number { color: var(--clr-audit); }
  .stat-card.running .number { color: var(--clr-warning); }
  .stat-card.failed .number { color: var(--clr-danger); }

  /* Timeline */
  .section-title { 
    font-size: 18px; 
    font-weight: 700;
    color: var(--text-primary); 
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title span {
    font-size: 12px;
    background: rgba(255, 255, 255, 0.1);
    padding: 2px 8px;
    border-radius: 12px;
    color: var(--text-secondary);
  }
  
  .timeline { margin-bottom: 32px; }
  
  .timeline-item {
    position: relative;
    padding: 20px 24px;
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    border-radius: 14px;
    border: 1px solid var(--border-color);
    margin-bottom: 12px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .timeline-item:hover { 
    border-color: rgba(99, 102, 241, 0.4); 
    box-shadow: 0 4px 25px rgba(99, 102, 241, 0.1);
    transform: translateX(2px);
  }
  
  .timeline-item .task-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  
  .timeline-item .task-name {
    font-weight: 700;
    font-size: 16px;
    color: var(--text-primary);
  }
  .timeline-item .task-time {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  
  .timeline-item .task-meta {
    display: flex;
    gap: 12px;
    margin: 8px 0;
    flex-wrap: wrap;
  }
  
  .timeline-item .task-target {
    background: rgba(99, 102, 241, 0.15);
    color: #818cf8;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(99, 102, 241, 0.25);
  }
  
  .timeline-item .task-sha {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .timeline-item .task-attempt {
    background: rgba(245, 158, 11, 0.1);
    color: var(--clr-warning);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  .timeline-item .task-links {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
  }

  .timeline-item .task-link {
    font-size: 12px;
    color: #818cf8;
    text-decoration: none;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
  }
  .timeline-item .task-link:hover {
    color: #a78bfa;
  }
  
  .timeline-item .task-detail {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 10px;
    line-height: 1.6;
    background: rgba(0, 0, 0, 0.2);
    padding: 10px 14px;
    border-radius: 8px;
    border-left: 3px solid var(--clr-primary);
  }

  .timeline-item .task-errors {
    color: #fda4af;
    font-size: 12px;
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(239, 68, 68, 0.1);
    border-radius: 8px;
    border-left: 3px solid var(--clr-danger);
    font-family: 'JetBrains Mono', monospace;
  }
  
  .timeline-item .task-badge {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .task-badge.done { background: rgba(16, 185, 129, 0.15); color: var(--clr-success); border: 1px solid rgba(16, 185, 129, 0.3); }
  .task-badge.needs_chatgpt_audit { background: rgba(139, 92, 246, 0.15); color: var(--clr-audit); border: 1px solid rgba(139, 92, 246, 0.3); }
  .task-badge.running { background: rgba(245, 158, 11, 0.15); color: var(--clr-warning); border: 1px solid rgba(245, 158, 11, 0.3); animation: pulse 1s infinite; }
  .task-badge.failed { background: rgba(239, 68, 68, 0.15); color: var(--clr-danger); border: 1px solid rgba(239, 68, 68, 0.3); }
  .task-badge.pending { background: rgba(148, 163, 184, 0.15); color: var(--text-secondary); border: 1px solid rgba(148, 163, 184, 0.3); }
  
  /* Activity Log */
  .activity-log { margin-bottom: 32px; }
  .log-container {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid var(--border-color);
    max-height: 250px;
    overflow-y: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .log-entry {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    padding: 6px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    line-height: 1.6;
    display: flex;
    gap: 8px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-entry .log-time { color: var(--text-muted); flex-shrink: 0; }
  .log-entry .log-action { color: var(--text-primary); }
  .log-entry .log-sender {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .log-sender.chatgpt { background: rgba(139, 92, 246, 0.2); color: #c084fc; }
  .log-sender.agy { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
  .log-sender.watcher { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

  .empty { color: var(--text-muted); text-align: center; padding: 24px; font-size: 14px; }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  
  .refresh-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--clr-primary);
    color: white;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, background-color 0.2s;
    z-index: 100;
  }
  .refresh-btn:hover {
    transform: scale(1.05);
    background-color: #4f46e5;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .project-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .project-card .name { font-weight: 700; font-size: 15px; }
  .project-card .path { color: var(--text-muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  .project-card a {
    color: #818cf8;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 AI Pipeline Dashboard</h1>
  <div class="subtitle">ChatGPT (Reviewer) &lt;=&gt; GitHub (Mailbox) &lt;=&gt; Watcher (Scheduler) &lt;=&gt; Antigravity (Executor)</div>
  <div class="last-update" id="last-update">Loading system state...</div>
  <div class="watcher-status idle" id="watcher-status">⚡ Watcher Ready</div>
</div>

<div class="stats" id="stats"></div>

<div class="timeline">
  <h2 class="section-title">📋 Task Queue / History <span id="task-count">0</span></h2>
  <div id="timeline-list"></div>
</div>

<div class="activity-log">
  <h2 class="section-title">📝 Watcher Exec Logs</h2>
  <div class="log-container">
    <div id="activity-list"></div>
  </div>
</div>

<div class="section">
  <h2 class="section-title">📁 Project Ecosystem</h2>
  <div class="projects-grid" id="project-list"></div>
</div>

<button class="refresh-btn" onclick="location.reload()">🔄</button>

<script>
async function loadStatus() {
  try {
    const resp = await fetch('status.json?t=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('last-update').innerHTML = '⚠️ <code>status.json</code> not found or loading error';
  }
}

function getStatusLabel(status) {
  switch (status) {
    case 'done': return '✅ PASSED';
    case 'needs_chatgpt_audit': return '⏳ AUDIT REQUIRED';
    case 'running': return '⚙️ EXECUTING';
    case 'failed': return '❌ FAILED';
    case 'pending': return '⏳ PENDING';
    default: return status.toUpperCase();
  }
}

function render(data) {
  document.getElementById('last-update').innerHTML = '🕐 Last Update: ' + data.lastUpdate;
  
  // Watcher status
  const ws = document.getElementById('watcher-status');
  if (data.running && data.running.length > 0) {
    ws.className = 'watcher-status busy';
    ws.textContent = '⚙️ Watcher Processing Tasks...';
  } else {
    ws.className = 'watcher-status idle';
    ws.textContent = '⚡ Watcher Standing By (2m Interval)';
  }

  // Count items
  const details = data.taskDetails || {};
  const numTotal = Object.keys(details).length;
  const numDone = Object.values(details).filter(t => t.status === 'done').length;
  const numAudit = Object.values(details).filter(t => t.status === 'needs_chatgpt_audit').length;
  const numRunning = Object.values(details).filter(t => t.status === 'running').length;
  const numFailed = Object.values(details).filter(t => t.status === 'failed').length;

  document.getElementById('task-count').textContent = numTotal;

  // Stats
  document.getElementById('stats').innerHTML =
    '<div class="stat-card total"><div class="number">' + numTotal + '</div><div class="label">Total Tasks</div></div>' +
    '<div class="stat-card done"><div class="number">' + numDone + '</div><div class="label">Done</div></div>' +
    '<div class="stat-card review"><div class="number">' + numAudit + '</div><div class="label">Needs Audit</div></div>' +
    '<div class="stat-card running"><div class="number">' + numRunning + '</div><div class="label">Running</div></div>' +
    '<div class="stat-card failed"><div class="number">' + numFailed + '</div><div class="label">Failed</div></div>';

  // Timeline
  const tl = document.getElementById('timeline-list');
  const allTasks = Object.keys(details).map(taskId => ({
    id: taskId,
    ...details[taskId]
  }));
  
  // Sort: Active first (running, needs_audit, pending), then failed, then done
  const statusWeight = {
    'running': 0,
    'needs_chatgpt_audit': 1,
    'pending': 2,
    'failed': 3,
    'done': 4
  };
  allTasks.sort((a, b) => (statusWeight[a.status] ?? 5) - (statusWeight[b.status] ?? 5));
  
  if (allTasks.length === 0) {
    tl.innerHTML = '<div class="empty">No tasks in the pipeline.</div>';
  } else {
    tl.innerHTML = allTasks.map(t => {
      const statusBadge = `<span class="task-badge ${t.status}">${getStatusLabel(t.status)}</span>`;
      
      const commitHtml = t.lastCommit ? `<span class="task-sha">SHA: ${t.lastCommit.substring(0, 7)}</span>` : '';
      const attemptHtml = `<span class="task-attempt">Attempt: ${t.attempt}/${t.maxAttempts}</span>`;
      
      const targetHtml = t.target ? `<span class="task-target">${t.target}</span>` : '';
      
      let summaryHtml = '';
      if (t.summary) {
        summaryHtml = `<div class="task-detail">${t.summary}</div>`;
      }

      let errorsHtml = '';
      if (t.blockingErrors && t.blockingErrors.length > 0) {
        errorsHtml = `<div class="task-errors"><strong>Blocking Issues:</strong><br>${t.blockingErrors.map(e => `• ${e}`).join('<br>')}</div>`;
      } else if (t.status === 'failed') {
        errorsHtml = `<div class="task-errors"><strong>Status:</strong> Failed after exceeding maximum retry attempts (${t.maxAttempts}).</div>`;
      }

      // Link mappings
      const repoUrl = `https://github.com/nickchen494949/mindmap-app`;
      const evidenceUrl = `${repoUrl}/tree/main/${t.evidencePacketPath}`;
      const liveUrl = t.liveUrl;
      const reviewUrl = t.chatgptAuditPath ? `${repoUrl}/blob/main/${t.chatgptAuditPath}` : '';

      let linksHtml = '';
      if (t.status !== 'pending' && t.status !== 'running') {
        linksHtml += `<a href="${evidenceUrl}" target="_blank" class="task-link">📊 Evidence Packet</a>`;
        if (liveUrl) {
          linksHtml += `<a href="${liveUrl}" target="_blank" class="task-link">🔗 View Live Site</a>`;
        }
        if (reviewUrl) {
          linksHtml += `<a href="${reviewUrl}" target="_blank" class="task-link">✍️ ChatGPT Audit Log</a>`;
        }
      }

      const completedHtml = t.completedAt ? `<div class="task-time">Passed at: ${t.completedAt}</div>` : '';

      return `
        <div class="timeline-item">
          <div class="task-header">
            <div>
              <div class="task-name">${t.title}</div>
              ${completedHtml}
            </div>
            ${statusBadge}
          </div>
          <div class="task-meta">
            ${targetHtml}
            ${commitHtml}
            ${attemptHtml}
          </div>
          ${summaryHtml}
          ${errorsHtml}
          ${linksHtml ? `<div class="task-links">${linksHtml}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  // Activity log
  const al = document.getElementById('activity-list');
  if (data.activityLog && data.activityLog.length > 0) {
    // Show last 30 entries
    const entries = [...data.activityLog].reverse();
    al.innerHTML = entries.map(entry => {
      const senderClass = entry.sender || 'watcher';
      const senderLabel = senderClass === 'chatgpt' ? 'Audit' : senderClass === 'agy' ? 'Exec' : 'Watcher';
      return `
        <div class="log-entry">
          <span class="log-time">[${entry.time}]</span> 
          <span class="log-sender ${senderClass}">${senderLabel}</span> 
          <span class="log-action">${entry.action}</span>
        </div>
      `;
    }).join('');
  } else {
    al.innerHTML = '<div class="empty">No logs available.</div>';
  }

  // Projects
  const pl = document.getElementById('project-list');
  if (!data.projects || data.projects.length === 0) {
    pl.innerHTML = '<div class="empty">No projects found.</div>';
  } else {
    pl.innerHTML = data.projects.map(p => {
      const live = p === 'mindmap-app' 
        ? 'https://nickchen494949.github.io/mindmap-app/' 
        : `https://nickchen494949.github.io/${p}/`;
      return `
        <div class="project-card">
          <div>
            <div class="name">📁 ${p}</div>
            <div class="path">~/projects/${p}</div>
          </div>
          <a href="${live}" target="_blank">🔗 Open Live</a>
        </div>
      `;
    }).join('');
  }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>
</body>
</html>
