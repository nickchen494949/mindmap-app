<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pipeline Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    padding: 30px 0;
    border-bottom: 1px solid #1e293b;
    margin-bottom: 30px;
  }
  .header h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header .subtitle { color: #64748b; font-size: 14px; }
  .header .last-update { color: #475569; font-size: 12px; margin-top: 8px; }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .stat-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid #334155;
  }
  .stat-card .number {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .stat-card .label { color: #94a3b8; font-size: 13px; }
  .stat-card.done .number { color: #22c55e; }
  .stat-card.pending .number { color: #f59e0b; }
  .stat-card.projects .number { color: #6366f1; }
  .stat-card.total .number { color: #e2e8f0; }

  .section { margin-bottom: 30px; }
  .section h2 {
    font-size: 18px;
    color: #94a3b8;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  
  .task-list { display: flex; flex-direction: column; gap: 8px; }
  .task-item {
    background: #1e293b;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid #334155;
    transition: border-color 0.2s;
  }
  .task-item:hover { border-color: #6366f1; }
  .task-item .icon { font-size: 20px; flex-shrink: 0; }
  .task-item .info { flex: 1; min-width: 0; }
  .task-item .name {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-item .meta { color: #64748b; font-size: 12px; margin-top: 2px; }
  .task-item .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .badge.done { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge.pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge.running { background: rgba(99,102,241,0.15); color: #818cf8; animation: pulse 1.5s infinite; }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  .empty { color: #475569; text-align: center; padding: 20px; font-size: 14px; }
  
  .refresh-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    transition: transform 0.2s;
  }
  .refresh-btn:hover { transform: scale(1.1); }
  .refresh-btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 AI Pipeline Dashboard</h1>
  <div class="subtitle">ChatGPT → GitHub → Watcher → Antigravity</div>
  <div class="last-update" id="last-update">Loading...</div>
</div>

<div class="stats" id="stats"></div>

<div class="section">
  <h2>⏳ Pending Tasks</h2>
  <div class="task-list" id="pending-list"></div>
</div>

<div class="section">
  <h2>✅ Completed Tasks</h2>
  <div class="task-list" id="done-list"></div>
</div>

<div class="section">
  <h2>📁 Projects</h2>
  <div class="task-list" id="project-list"></div>
</div>

<button class="refresh-btn" onclick="location.reload()">🔄</button>

<script>
async function loadStatus() {
  try {
    const resp = await fetch('status.json?t=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('last-update').textContent = '⚠️ status.json not found. Watcher has not run yet.';
  }
}

function render(data) {
  // Last update
  document.getElementById('last-update').textContent = '🕐 Last updated: ' + data.lastUpdate;
  
  // Stats
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat-card total"><div class="number">${data.totalTasks}</div><div class="label">Total Tasks</div></div>
    <div class="stat-card done"><div class="number">${data.doneTasks}</div><div class="label">Completed</div></div>
    <div class="stat-card pending"><div class="number">${data.pendingTasks}</div><div class="label">Pending</div></div>
    <div class="stat-card projects"><div class="number">${data.projects.length}</div><div class="label">Projects</div></div>
  `;
  
  // Pending
  const pendingEl = document.getElementById('pending-list');
  if (data.pending.length === 0) {
    pendingEl.innerHTML = '<div class="empty">No pending tasks. All clear! 🎉</div>';
  } else {
    pendingEl.innerHTML = data.pending.map(t => `
      <div class="task-item">
        <div class="icon">📋</div>
        <div class="info">
          <div class="name">${t}</div>
        </div>
        <span class="badge pending">PENDING</span>
      </div>
    `).join('');
  }
  
  // Done
  const doneEl = document.getElementById('done-list');
  if (data.done.length === 0) {
    doneEl.innerHTML = '<div class="empty">No completed tasks yet.</div>';
  } else {
    doneEl.innerHTML = data.done.map(t => `
      <div class="task-item">
        <div class="icon">✅</div>
        <div class="info">
          <div class="name">${t}</div>
        </div>
        <span class="badge done">DONE</span>
      </div>
    `).join('');
  }
  
  // Projects
  const projEl = document.getElementById('project-list');
  if (data.projects.length === 0) {
    projEl.innerHTML = '<div class="empty">No external projects yet.</div>';
  } else {
    projEl.innerHTML = data.projects.map(p => `
      <div class="task-item">
        <div class="icon">📁</div>
        <div class="info">
          <div class="name">${p}</div>
          <div class="meta">~/projects/${p}</div>
        </div>
        <span class="badge done">ACTIVE</span>
      </div>
    `).join('');
  }
}

loadStatus();
// Auto-refresh every 60 seconds
setInterval(loadStatus, 60000);
</script>
</body>
</html>
