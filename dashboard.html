<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pipeline Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
  }
  
  .header {
    text-align: center;
    padding: 24px 0;
    border-bottom: 1px solid #1e293b;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 24px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .subtitle { color: #64748b; font-size: 13px; margin-top: 4px; }
  .header .last-update { color: #475569; font-size: 12px; margin-top: 8px; }
  .header .watcher-status {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .watcher-status.idle { background: rgba(34,197,94,0.15); color: #22c55e; }
  .watcher-status.busy { background: rgba(99,102,241,0.15); color: #818cf8; animation: pulse 1.5s infinite; }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #1e293b;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    border: 1px solid #334155;
  }
  .stat-card .number { font-size: 28px; font-weight: 700; }
  .stat-card .label { color: #94a3b8; font-size: 11px; margin-top: 2px; }
  .stat-card.done .number { color: #22c55e; }
  .stat-card.pending .number { color: #f59e0b; }
  .stat-card.projects .number { color: #6366f1; }
  .stat-card.total .number { color: #e2e8f0; }

  /* Timeline */
  .timeline { margin-bottom: 24px; }
  .timeline h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
  
  .timeline-item {
    position: relative;
    padding: 12px 16px 12px 40px;
    background: #1e293b;
    border-radius: 10px;
    border: 1px solid #334155;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .timeline-item:hover { border-color: #6366f1; }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .timeline-item.done::before { background: #22c55e; }
  .timeline-item.pending::before { background: #f59e0b; }
  .timeline-item.running::before { background: #818cf8; animation: pulse 1s infinite; }
  
  .timeline-item .task-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .timeline-item .task-time {
    color: #64748b;
    font-size: 11px;
  }
  .timeline-item .task-detail {
    color: #94a3b8;
    font-size: 12px;
    margin-top: 6px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .timeline-item .task-target {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    color: #818cf8;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 4px;
  }
  .timeline-item .task-badge {
    position: absolute;
    right: 12px;
    top: 12px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 600;
  }
  .task-badge.done { background: rgba(34,197,94,0.15); color: #22c55e; }
  .task-badge.pending { background: rgba(245,158,11,0.15); color: #f59e0b; }
  
  /* Activity Log */
  .activity-log { margin-bottom: 24px; }
  .activity-log h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
  .log-entry {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 11px;
    color: #64748b;
    padding: 4px 0;
    border-bottom: 1px solid #1e293b;
    line-height: 1.6;
  }
  .log-entry .log-time { color: #475569; }
  .log-entry .log-action { color: #94a3b8; }
  .log-entry .log-highlight { color: #22c55e; font-weight: 600; }
  .log-entry .log-warn { color: #f59e0b; }
  .log-entry .log-sender {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    margin-right: 4px;
  }
  .log-sender.chatgpt { background: rgba(16,163,127,0.2); color: #10a37f; }
  .log-sender.agy { background: rgba(99,102,241,0.2); color: #818cf8; }
  .log-sender.watcher { background: rgba(245,158,11,0.2); color: #f59e0b; }

  .empty { color: #475569; text-align: center; padding: 20px; font-size: 13px; }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .refresh-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.4);
  }

  .section { margin-bottom: 24px; }
  .section h2 { font-size: 16px; color: #94a3b8; margin-bottom: 12px; }
  .project-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .project-card .name { font-weight: 600; font-size: 14px; }
  .project-card .path { color: #64748b; font-size: 11px; }
  .project-card a {
    color: #818cf8;
    text-decoration: none;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🧠 AI Pipeline Dashboard</h1>
  <div class="subtitle">ChatGPT 指挥 → GitHub 信箱 → Watcher 调度 → Antigravity 执行</div>
  <div class="last-update" id="last-update">Loading...</div>
  <div class="watcher-status idle" id="watcher-status">⚡ Watcher 运行中</div>
</div>

<div class="stats" id="stats"></div>

<div class="timeline">
  <h2>📋 任务时间线</h2>
  <div id="timeline-list"></div>
</div>

<div class="activity-log">
  <h2>📝 执行日志</h2>
  <div id="activity-list"></div>
</div>

<div class="section">
  <h2>📁 项目列表</h2>
  <div id="project-list"></div>
</div>

<button class="refresh-btn" onclick="location.reload()">🔄</button>

<script>
async function loadStatus() {
  try {
    const resp = await fetch('status.json?t=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById('last-update').textContent = '⚠️ status.json not found';
  }
}

function render(data) {
  document.getElementById('last-update').textContent = '🕐 ' + data.lastUpdate;
  
  // Watcher status
  var ws = document.getElementById('watcher-status');
  if (data.pendingTasks > 0) {
    ws.className = 'watcher-status busy';
    ws.textContent = '⚙️ 正在处理任务...';
  } else {
    ws.className = 'watcher-status idle';
    ws.textContent = '⚡ Watcher 待命中 (每2分钟扫描)';
  }

  // Stats
  document.getElementById('stats').innerHTML =
    '<div class="stat-card total"><div class="number">' + data.totalTasks + '</div><div class="label">总任务</div></div>' +
    '<div class="stat-card done"><div class="number">' + data.doneTasks + '</div><div class="label">已完成</div></div>' +
    '<div class="stat-card pending"><div class="number">' + data.pendingTasks + '</div><div class="label">等待中</div></div>' +
    '<div class="stat-card projects"><div class="number">' + data.projects.length + '</div><div class="label">项目</div></div>';

  // Timeline - show all tasks with details
  var tl = document.getElementById('timeline-list');
  var allTasks = [];
  
  // Add done tasks
  (data.done || []).forEach(function(t) {
    allTasks.push({ name: t, status: 'done', detail: data.taskDetails ? data.taskDetails[t] : null });
  });
  // Add pending tasks
  (data.pending || []).forEach(function(t) {
    allTasks.push({ name: t, status: 'pending', detail: data.taskDetails ? data.taskDetails[t] : null });
  });
  
  // Reverse so newest first
  allTasks.reverse();
  
  if (allTasks.length === 0) {
    tl.innerHTML = '<div class="empty">还没有任何任务</div>';
  } else {
    tl.innerHTML = allTasks.map(function(t) {
      var detail = t.detail || {};
      var targetHtml = detail.target ? '<div class="task-target">→ ' + detail.target + '</div>' : '';
      var summaryHtml = detail.summary ? '<div class="task-detail">' + detail.summary + '</div>' : '';
      var timeHtml = detail.completedAt ? '<div class="task-time">完成于: ' + detail.completedAt + '</div>' : '';
      return '<div class="timeline-item ' + t.status + '">' +
        '<span class="task-badge ' + t.status + '">' + (t.status === 'done' ? '✅ 完成' : '⏳ 等待') + '</span>' +
        '<div class="task-name">' + t.name.replace('task-', '').replace('.md', '').replace(/-/g, ' ') + '</div>' +
        timeHtml + targetHtml + summaryHtml +
      '</div>';
    }).join('');
  }

  // Activity log
  var al = document.getElementById('activity-list');
  if (data.activityLog && data.activityLog.length > 0) {
    al.innerHTML = data.activityLog.map(function(entry) {
      var senderClass = entry.sender || 'watcher';
      var senderLabel = senderClass === 'chatgpt' ? 'ChatGPT' : senderClass === 'agy' ? 'Antigravity' : 'Watcher';
      return '<div class="log-entry">' +
        '<span class="log-time">[' + entry.time + ']</span> ' +
        '<span class="log-sender ' + senderClass + '">' + senderLabel + '</span> ' +
        '<span class="log-action">' + entry.action + '</span>' +
      '</div>';
    }).join('');
  } else {
    al.innerHTML = '<div class="empty">暂无日志</div>';
  }

  // Projects
  var pl = document.getElementById('project-list');
  if (data.projects.length === 0) {
    pl.innerHTML = '<div class="empty">暂无外部项目</div>';
  } else {
    pl.innerHTML = data.projects.map(function(p) {
      return '<div class="project-card">' +
        '<div><div class="name">📁 ' + p + '</div>' +
        '<div class="path">~/projects/' + p + '</div></div>' +
        '<a href="https://nickchen494949.github.io/' + p + '/" target="_blank">🔗 Live</a>' +
      '</div>';
    }).join('');
  }
}

loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
